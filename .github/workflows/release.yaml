name: Release

on:
  push:
    tags:
      # Matches package-version tags like yama@0.1.0, yama@1.2.3
      - 'yama@*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install PKL
        run: |
          curl -L -o pkl https://github.com/apple/pkl/releases/latest/download/pkl-linux-amd64
          chmod +x pkl
          sudo mv pkl /usr/local/bin/
          pkl --version

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED=$(pkl eval -x 'package.name + "@" + package.version' PklProject)
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag '$TAG' does not match PklProject '$EXPECTED'"
            exit 1
          fi
          echo "Tag matches: $TAG"

      - name: Run tests
        run: pkl test tests/Profile.test.pkl

      - name: Build package
        run: pkl project package

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#yama@}"
          gh release create "$TAG" \
            --title "yama-pkl $VERSION" \
            --notes "PKL schema package for authoring YAMA profiles. See [documentation](https://docs.yamaml.org/specs/yamaml/pkl) for usage." \
            ".out/yama@$VERSION/yama@$VERSION.zip" \
            ".out/yama@$VERSION/yama@$VERSION.zip.sha256" \
            ".out/yama@$VERSION/yama@$VERSION" \
            ".out/yama@$VERSION/yama@$VERSION.sha256"

  docs:
    runs-on: ubuntu-latest
    needs: release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install jpkldoc
        run: |
          curl -L -o jpkldoc https://github.com/apple/pkl/releases/latest/download/jpkldoc
          chmod +x jpkldoc
          sudo mv jpkldoc /usr/local/bin/

      - name: Generate API docs
        timeout-minutes: 3
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PACKAGE_URI="package://pkg.pkl-lang.org/github.com/yamaml/yama-pkl/yama@${TAG#yama@}"
          echo "Generating docs for: $PACKAGE_URI"
          timeout 120 jpkldoc -o docs/ "$PACKAGE_URI" || true
          if [ -f docs/index.html ]; then
            echo "Docs generated successfully"
            find docs/ -name '*.html' | wc -l
          else
            echo "::error::Doc generation failed — no output"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
